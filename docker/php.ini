; Maximum size of a single uploaded file
upload_max_filesize = 500M

; Maximum size of the entire POST request body (must be > upload_max_filesize)
post_max_size = 510M

; Memory limit per PHP process
; With streaming extraction, a single request rarely uses more than 50-100MB,
; but we set 256M to leave room for the full extracted text string.
memory_limit = 256M

; Maximum execution time in seconds.
; OCR of a large scanned PDF (hundreds of pages) can take many minutes.
; 1800 = 30 minutes — enough for any realistic file while still protecting against hung processes.
max_execution_time = 1800
