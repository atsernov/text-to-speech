server {
    listen 80;
    server_name _;

    root /app/public;
    index index.php;

    # Allow uploading files up to 500MB (large PDFs, scanned books)
    client_max_body_size 500M;

    # Security headers
    # Prevents browsers from guessing content type (MIME sniffing attacks)
    add_header X-Content-Type-Options "nosniff" always;
    # Blocks the page from being embedded in iframes on other domains (clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Limits how much referrer info is sent to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restricts browser features not used by this app
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # All requests go through Laravel (SPA / Inertia)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    # Deny access to hidden files (.env, .git etc.)
    location ~ /\. {
        deny all;
    }
}
