[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

; ── Web server ────────────────────────────────────────────────────────────────
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.err.log

; ── PHP processor ─────────────────────────────────────────────────────────────
[program:php-fpm]
command=/usr/local/sbin/php-fpm --nodaemonize
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/php-fpm.log
stderr_logfile=/var/log/supervisor/php-fpm.err.log

; ── Background job worker ─────────────────────────────────────────────────────
[program:queue]
command=php /app/artisan queue:work --tries=1 --sleep=3
numprocs=3
process_name=%(program_name)s_%(process_num)02d
directory=/app
user=www-data
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/queue.log
stderr_logfile=/var/log/supervisor/queue.err.log

; ── Task scheduler (runs every 60 seconds, same as cron) ─────────────────────
[program:scheduler]
command=/bin/bash -c "while true; do php /app/artisan schedule:run; sleep 60; done"
directory=/app
user=www-data
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/scheduler.log
stderr_logfile=/var/log/supervisor/scheduler.err.log
